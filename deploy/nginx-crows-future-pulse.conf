# Nginx vhost for crows.future-pulse.de
# Wird per certbot --nginx um SSL-Block + 443-Listener ergänzt

server {
    server_name crows.future-pulse.de;

    # ACME challenge (wird von certbot --nginx genutzt)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Next.js standalone → Container auf 127.0.0.1:3002
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/crows.future-pulse.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/crows.future-pulse.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name crows.future-pulse.de;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}