# nginx server block for crows.future-pulse.de
# Drop into /etc/nginx/sites-available/crows-future-pulse and symlink.
# Assumes certbot has issued certs at /etc/letsencrypt/live/crows.future-pulse.de.

server {
    listen 80;
    server_name crows.future-pulse.de;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name crows.future-pulse.de;

    ssl_certificate     /etc/letsencrypt/live/crows.future-pulse.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crows.future-pulse.de/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass         http://crows-federation:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Long-lived connections for any future websocket
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }
}